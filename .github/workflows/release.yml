name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      track:
        description: 'Play Store track to upload to'
        required: true
        type: choice
        default: 'internal'
        options:
          - internal
          - alpha
          - beta
          - production
      version_tag:
        description: 'Git tag to upload (e.g., v1.6.0). Leave blank to use latest.'
        required: false
        type: string
        default: ''

permissions:
  contents: write

env:
  flutter-version: "3.44.2"
  ruby-version: "3.4"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check tag existence
        id: tag_check
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | xargs)
          VERSION_NAME=$(echo "$VERSION" | cut -d+ -f1)
          VERSION_CODE=$(echo "$VERSION" | cut -d+ -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT

          if git rev-parse "v$VERSION_NAME" >/dev/null 2>&1; then
            TAG_SHA=$(git rev-list -n 1 "v$VERSION_NAME")
            CURRENT_SHA=$(git rev-parse HEAD)
            if [ "$TAG_SHA" = "$CURRENT_SHA" ]; then
              echo "Tag v$VERSION_NAME already exists on this commit. Skipping release."
              echo "should_release=false" >> $GITHUB_OUTPUT
            else
              echo "Error: Tag v$VERSION_NAME already exists on a different commit."
              echo "Bump the version in pubspec.yaml and push again."
              exit 1
            fi
          else
            echo "should_release=true" >> $GITHUB_OUTPUT
          fi

      - name: Setup Flutter
        if: steps.tag_check.outputs.should_release == 'true'
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.flutter-version }}
          cache: true

      - name: Install dependencies
        if: steps.tag_check.outputs.should_release == 'true'
        run: flutter pub get

      - name: Set up signing
        if: steps.tag_check.outputs.should_release == 'true'
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/release.keystore
          cat > android/key.properties << EOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=upload
          storeFile=release.keystore
          EOF

      - name: Build fdroid APKs (per ABI)
        if: steps.tag_check.outputs.should_release == 'true'
        run: flutter build apk --release --split-per-abi

      - name: Generate changelog
        if: steps.tag_check.outputs.should_release == 'true'
        run: |
          mkdir -p fastlane/metadata/android/en-US/changelogs
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            git log --format="- %s" "$PREV_TAG..HEAD" > "fastlane/metadata/android/en-US/changelogs/${{ steps.tag_check.outputs.version_code }}.txt"
          else
            git log --format="- %s" > "fastlane/metadata/android/en-US/changelogs/${{ steps.tag_check.outputs.version_code }}.txt"
          fi

      - name: Commit changelog and create tag
        if: steps.tag_check.outputs.should_release == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "fastlane/metadata/android/en-US/changelogs/${{ steps.tag_check.outputs.version_code }}.txt"
          git commit -m "Add changelog for v${{ steps.tag_check.outputs.version }}" || echo "No changes to commit"
          git tag "v${{ steps.tag_check.outputs.version_name }}"
          git push origin HEAD:main "v${{ steps.tag_check.outputs.version_name }}"

      - name: Create GitHub Release
        if: steps.tag_check.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.tag_check.outputs.version_name }}
          files: |
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
          generate_release_notes: true

  upload_play_store:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout tag (if specified)
        if: ${{ inputs.version_tag != '' }}
        run: git checkout "${{ inputs.version_tag }}"

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.ruby-version }}
          bundler-cache: true

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.flutter-version }}
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Set up signing
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/release.keystore
          cat > android/key.properties << EOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=upload
          storeFile=release.keystore
          EOF

      - name: Set up Play Store credentials
        env:
          PLAY_STORE_SERVICE_ACCOUNT_KEY: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_KEY }}
        run: |
          echo "$PLAY_STORE_SERVICE_ACCOUNT_KEY" > play-store-key.json

      - name: Upload to Play Store
        env:
          TRACK: ${{ inputs.track || 'internal' }}
        run: bundle exec fastlane deploy track:$TRACK
